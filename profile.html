<body>

<nav class="navbar navbar-expand-lg navbar-dark cp-navbar">
  <div class="container">
    <a class="navbar-brand cp-brand" href="index.html"><span class="brand-icon">SC</span> SmartCalc</a>

      </ul>
    </div>
  </div>
</nav>

<main class="cp-page-main">
  <div class="container">
    <div class="text-center mb-5">
      <p class="cp-eyebrow">Особистий кабінет</p>
      <h1 class="cp-headline-sm">Мій <span class="cp-accent">профіль</span></h1>
    </div>

    <div class="row justify-content-center g-4">
      <div class="col-lg-3 col-md-4 text-center">
        <div class="cp-card h-100 d-flex flex-column align-items-center justify-content-center gap-3">
          <div id="profileAvatar" class="cp-avatar">??</div>
          <div>
            <p id="profileFullName" class="cp-username mb-1">—</p>
            <p id="profileEmail" class="cp-user-email">—</p>
          </div>
          <button id="btnLogout" class="btn cp-btn-outline w-100 mt-2">Вийти</button>
        </div>
      </div>

      <div class="col-lg-7 col-md-8">
        <div class="cp-card">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="cp-card-title mb-0">Особисті дані</h3>
          </div>
          <div class="table-responsive">
            <table class="table cp-table">
              <tbody>
                <tr>
                  <th>Ім'я</th>
                  <td id="tName">—</td>
                </tr>
                <tr>
                  <th>Email</th>
                  <td id="tEmail">—</td>
                </tr>
                <tr>
                  <th>Стать</th>
                  <td id="tGender">—</td>
                </tr>
                <tr>
                  <th>Дата народження</th>
                  <td id="tBirthdate">—</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
